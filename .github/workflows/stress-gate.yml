name: Automated Engine Stress Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  stress-test:
    name: 100k Node Performance Gate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Run Engine Stress Test
        run: npx tsx packages/scene-graph/src/stress-test.ts
