name: Multi-OS Integrity Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
      
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers (and system dependencies on Linux)
      if: runner.os == 'Linux'
      run: npx playwright install --with-deps

    - name: Build project
      run: npm run build

    - name: Run E2E Tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run test:e2e
      
    - name: Run E2E Tests (Windows / macOS)
      if: runner.os != 'Linux'
      run: npm run test:e2e

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.os }}
        path: apps/editor/playwright-report/
        retention-days: 7
